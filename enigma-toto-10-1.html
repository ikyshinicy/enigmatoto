<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enigma Toto Premium</title>

<style>
body{background:#05070f;color:#fff;font-family:sans-serif;text-align:center;padding:40px}
button{padding:12px 20px;border:none;border-radius:6px;cursor:pointer;font-weight:bold}
.btn{background:gold;color:#000}
input{padding:10px;border-radius:6px;border:1px solid #333;width:85%;margin-top:10px;color:#fff;background:#0b0f22}
#popup{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center}
.box{background:#0d1228;padding:26px;border-radius:12px;max-width:340px;border:1px solid #c9a84c}
.small{font-size:12px;color:#aaa}
</style>
</head>

<body>

<h1>🔮 ENIGMA TOTO</h1>
<p>1x gratis • selanjutnya butuh akses</p>

<button class="btn" onclick="run()">🔍 Analisis</button>
<div id="result" style="margin-top:30px;"></div>

<!-- POPUP -->
<div id="popup">
  <div class="box">
    <h2>🔒 Premium</h2>
    <p class="small">Free trial habis. Masukkan kode akses.</p>

    <input id="code" placeholder="Masukkan kode" />
    <div class="small" id="msg" style="margin-top:8px;"></div>

    <br>
    <button class="btn" onclick="unlock()">Unlock</button>
    <br><br>
    <button onclick="closePopup()" style="background:transparent;border:1px solid #555;color:#aaa;padding:8px 16px;">Tutup</button>
  </div>
</div>

<script>
// ================= CONFIG =================
// Kode disimpan sebagai HASH (SHA-256) + expiry (YYYY-MM-DD)
const CODE_DB = [
  { hash: "e3afed0047b08059d0fada10f400c1e5f4b3c3a7e6e2b7e3b7b6c9e0d5b2b7c1", exp: "2026-12-31" }, // contoh hash
  { hash: "5e884898da28047151d0e56f8dc6292773603d0d6aabbddbbd3e5e5b6f7c9a1a", exp: "2026-12-31" }
];

// ================= STATE =================
let usage = parseInt(localStorage.getItem("usage") || "0");
let premium = localStorage.getItem("premium") === "true";

// kode yang sudah dipakai (one-time use)
let usedHashes = JSON.parse(localStorage.getItem("usedHashes") || "[]");

// ================= UTIL =================
async function sha256(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}
function today(){
  return new Date().toISOString().slice(0,10);
}

// ================= CORE =================
function run(){
  if(!premium && usage >= 1){
    showPopup();
    return;
  }
  usage++;
  localStorage.setItem("usage", usage);

  const angka = Math.floor(Math.random()*9000)+1000;
  document.getElementById("result").innerHTML = "<h2>Hasil: "+angka+"</h2>";
}

function showPopup(){ document.getElementById("popup").style.display="flex"; }
function closePopup(){ document.getElementById("popup").style.display="none"; setMsg(""); }

function setMsg(t, ok=false){
  const el = document.getElementById("msg");
  el.textContent = t || "";
  el.style.color = ok ? "#00ff88" : "#ff4d6d";
}

// ================= UNLOCK =================
async function unlock(){
  const input = (document.getElementById("code").value || "").trim();
  if(!input){ setMsg("Masukkan kode"); return; }

  const h = await sha256(input);

  // cek ada di DB
  const rec = CODE_DB.find(c => c.hash === h);
  if(!rec){ setMsg("Kode tidak valid"); return; }

  // cek expiry
  if(today() > rec.exp){ setMsg("Kode kadaluarsa"); return; }

  // cek sudah dipakai (one-time)
  if(usedHashes.includes(h)){ setMsg("Kode sudah digunakan"); return; }

  // sukses
  usedHashes.push(h);
  localStorage.setItem("usedHashes", JSON.stringify(usedHashes));

  localStorage.setItem("premium","true");
  premium = true;

  setMsg("Akses terbuka", true);
  setTimeout(closePopup, 700);
}
</script>

</body>
</html>
